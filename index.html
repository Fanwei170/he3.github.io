<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>双人PK·法兰克王国挑战赛 | 九年级历史课堂游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }
 
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3c2c 0%, #0f2a1c 100%);
            font-family: 'Segoe UI', 'Poppins', 'Cinema', 'Roboto', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
 
        /* 游戏主面板 */
        .game-wrapper {
            max-width: 1400px;
            width: 100%;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(4px);
            border-radius: 80px;
            padding: 20px 25px 30px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), inset 0 1px 2px rgba(255, 255, 255, 0.2);
        }
 
        /* 双人头像区 */
        .pk-arena {
            display: flex;
            justify-content: space-between;
            gap: 25px;
            margin-bottom: 30px;
        }
 
        .player {
            flex: 1;
            background: #fef2df;
            border-radius: 60px;
            padding: 20px 15px;
            text-align: center;
            box-shadow: 0 12px 0 #b97f44;
            transition: all 0.2s ease;
            border: 2px solid #ffcd94;
            position: relative;
        }
 
        .player.active {
            background: #fff0c0;
            transform: scale(1.02);
            box-shadow: 0 0 0 4px #ffd966, 0 12px 0 #b97f44;
            border: 2px solid #f3b33d;
        }
 
        .player-name {
            font-size: 2rem;
            font-weight: 800;
            background: #4a2a1e;
            display: inline-block;
            padding: 0 28px;
            border-radius: 50px;
            color: #ffdd99;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }
 
        .player-score {
            font-size: 3rem;
            font-weight: bold;
            background: #2c4727;
            display: inline-block;
            width: 120px;
            border-radius: 60px;
            color: #f9e45b;
            line-height: 1.2;
            margin: 10px auto;
            box-shadow: inset 0 -3px 0 #1b2e17;
        }
 
        .player-badge {
            font-size: 1rem;
            background: #e0cba0;
            border-radius: 40px;
            padding: 6px 15px;
            display: inline-flex;
            gap: 8px;
            font-weight: bold;
        }
 
        /* 对战中央 */
        .battle-core {
            background: #2b2118e0;
            border-radius: 65px;
            padding: 25px 20px 20px;
            margin: 10px 0 20px;
            border: 1px solid #e5bc7c;
            backdrop-filter: blur(5px);
        }
 
        .question-panel {
            background: #fff6e8;
            border-radius: 55px;
            padding: 25px 20px;
            text-align: center;
            box-shadow: inset 0 0 0 2px #fff3cf, 0 10px 20px rgba(0, 0, 0, 0.3);
        }
 
        .question-text {
            font-size: 1.8rem;
            font-weight: 700;
            color: #2d2b1f;
            margin-bottom: 20px;
            line-height: 1.4;
            min-height: 110px;
        }
 
        .timer-area {
            margin: 10px 0 20px;
        }
 
        .timer-bar-bg {
            width: 100%;
            background: #d9c2a7;
            border-radius: 40px;
            height: 20px;
            overflow: hidden;
        }
 
        .timer-fill {
            width: 100%;
            height: 100%;
            background: #e6b422;
            border-radius: 40px;
            transition: width 0.1s linear;
        }
 
        .timer-text {
            font-family: monospace;
            font-size: 1.4rem;
            font-weight: bold;
            color: #fad974;
            margin-top: 8px;
        }
 
        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 15px;
            margin: 25px 0 20px;
        }
 
        .option-btn {
            background: #352b22;
            border: 2px solid #bd9a6b;
            border-radius: 60px;
            padding: 14px 8px;
            font-size: 1rem;
            font-weight: bold;
            color: #fcf3da;
            cursor: pointer;
            transition: all 0.1s;
            text-align: center;
            font-weight: 600;
        }
 
        .option-btn:hover:not(:disabled) {
            background: #5e3e2c;
            border-color: #ffcf8a;
            transform: scale(0.98);
        }
 
        .option-btn:disabled {
            opacity: 0.55;
            cursor: not-allowed;
            transform: none;
        }
 
        .next-btn {
            background: #d69e3b;
            border: none;
            font-size: 1.6rem;
            font-weight: bold;
            padding: 12px 40px;
            border-radius: 60px;
            color: #2d2b1f;
            cursor: pointer;
            box-shadow: 0 6px 0 #7a4c1a;
            transition: 0.05s linear;
            width: 260px;
            margin: 0 auto;
        }
 
        .next-btn:active {
            transform: translateY(3px);
            box-shadow: 0 3px 0 #7a4c1a;
        }
 
        .game-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            padding: 0 15px;
            color: #ffecb3;
            font-weight: bold;
        }
 
        .reset-game {
            background: #8b5a2b;
            border: none;
            padding: 8px 22px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.1s;
        }
 
        .reset-game:active {
            transform: scale(0.96);
        }
 
        /* 惩罚弹窗 */
        .penalty-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.88);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            backdrop-filter: blur(6px);
        }
 
        .penalty-card {
            background: #fff2df;
            border-radius: 70px;
            max-width: 550px;
            width: 85%;
            padding: 40px 25px 45px;
            text-align: center;
            border: 8px solid #e5a63e;
            animation: shake 0.3s ease-in-out 0s 2;
        }
 
        .penalty-card h2 {
            font-size: 2.5rem;
            margin: 0;
            color: #aa2e1e;
        }
 
        .penalty-card p {
            font-size: 1.7rem;
            margin: 25px 0;
            font-weight: bold;
        }
 
        .penalty-close {
            background: #c97e2a;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            font-size: 1.3rem;
            font-weight: bold;
            color: white;
            cursor: pointer;
        }
 
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            25% { transform: translate(-2px, 0px); }
            50% { transform: translate(2px, 0px); }
            75% { transform: translate(-1px, 1px); }
        }
 
        @media (max-width: 750px) {
            .question-text { font-size: 1.2rem; }
            .player-name { font-size: 1.3rem; padding: 0 15px; }
            .options-grid { grid-template-columns: 1fr; }
            .next-btn { width: 200px; font-size: 1.3rem; }
        }
 
        .turn-tip {
            background: #e6c48b;
            border-radius: 40px;
            padding: 6px 18px;
            font-weight: bold;
            color: #2e241a;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <!-- 双人区域 -->
    <div class="pk-arena">
        <div class="player" id="player1Card">
            <div class="player-name">⚔️ 骑士·克洛维 ⚔️</div>
            <div class="player-score" id="scoreP1">0</div>
            <div class="player-badge">✝️ 法兰克勇士</div>
        </div>
        <div class="player" id="player2Card">
            <div class="player-name">🛡️ 主教·查理 🛡️</div>
            <div class="player-score" id="scoreP2">0</div>
            <div class="player-badge">👑 教会守护者</div>
        </div>
    </div>
 
    <!-- 战斗核心 -->
    <div class="battle-core">
        <div class="question-panel">
            <div class="question-text" id="questionText">⚜️ 点击「下一题」开始挑战 ⚜️</div>
            <div class="timer-area">
                <div class="timer-bar-bg"><div class="timer-fill" id="timerFill" style="width: 100%"></div></div>
                <div class="timer-text" id="timerDisplay">⏳ 等待开始</div>
            </div>
            <div class="options-grid" id="optionsContainer"></div>
            <div style="display: flex; justify-content: center;">
                <button class="next-btn" id="nextBtn">⚡ 下一题 ⚡</button>
            </div>
        </div>
    </div>
 
    <div class="game-footer">
        <span class="turn-tip">🎮 当前回合: <strong id="turnIndicator">左将(骑士)</strong></span>
        <span>📜 第 <span id="qIndex">0</span> / <span id="totalQ">20</span> 题</span>
        <button class="reset-game" id="resetGameBtn">🔄 重新开局</button>
    </div>
</div>
 
<script>
    // ======================= 基于第7课 基督教的兴起和法兰克王国 题库 =======================
    const QUESTION_SET = [
        { text: "基督教诞生于哪个世纪？", options: ["1世纪", "2世纪", "4世纪末", "5世纪"], correct: 0 },
        { text: "基督教成为罗马国教是在什么时候？", options: ["1世纪", "2世纪", "4世纪末", "5世纪初"], correct: 2 },
        { text: "法兰克王国的建立者是？", options: ["查理大帝", "克洛维", "丕平", "查理·马特"], correct: 1 },
        { text: "法兰克王国建立于哪一年？", options: ["481年", "800年", "843年", "476年"], correct: 0 },
        { text: "西欧封建制度确立的核心纽带是什么？", options: ["血缘关系", "土地封赐", "金钱契约", "宗教仪式"], correct: 1 },
        { text: "封君封臣制改革发生于哪个世纪前期？", options: ["7世纪", "8世纪", "9世纪", "10世纪"], correct: 1 },
        { text: "查理曼帝国分裂的时间是？", options: ["800年", "814年", "843年", "870年"], correct: 2 },
        { text: "843年帝国分裂后，形成哪三个国家的雏形？", options: ["英法德", "德法意", "法德西", "意奥匈"], correct: 1 },
        { text: "查理大帝鼓励基督教发展，征收的特别税叫？", options: ["教会税", "什一税", "领地税", "赎罪税"], correct: 1 },
        { text: "以下哪项是封臣对封君的义务？", options: ["提供保护", "不能任意侵害", "无偿服兵役", "授予土地"], correct: 2 },
        { text: "“我的附庸的附庸，不是我的附庸”反映了什么？", options: ["中央集权强大", "等级层层依附不越级", "王权至高无上", "人人平等"], correct: 1 },
        { text: "西罗马帝国灭亡后西欧逐渐进入什么社会？", options: ["奴隶社会", "封建社会", "资本主义", "原始社会"], correct: 1 },
        { text: "哪一年教皇为查理加冕称“罗马人的皇帝”？", options: ["800年", "814年", "843年", "751年"], correct: 0 },
        { text: "法兰克王国皈依基督教的关键人物是？", options: ["查理曼", "克洛维", "丕平", "查理·马特"], correct: 1 },
        { text: "8世纪法兰克土地分封改革后，接受土地的人成为？", options: ["封君", "封臣", "骑士", "领主"], correct: 1 },
        { text: "查理曼帝国是西欧哪个王国的巅峰？", options: ["英吉利王国", "法兰克王国", "德意志王国", "伦巴第王国"], correct: 1 },
        { text: "西欧中世纪王权与教权的关系是？", options: ["教权凌驾一切", "王权完全控制教会", "相互利用相互依存", "长期对立战争"], correct: 2 },
        { text: "基督教诞生地点是？", options: ["高卢地区", "巴勒斯坦地区", "小亚细亚", "意大利半岛"], correct: 1 },
        { text: "克洛维巩固统治的措施不包括？", options: ["皈依基督教", "赐土地给教会", "保留罗马大地主土地", "推行封君封臣制改革"], correct: 3 },
        { text: "西罗马灭亡后日耳曼人在西欧建立的最强大王国是？", options: ["东哥特王国", "法兰克王国", "勃艮第王国", "西哥特王国"], correct: 1 }
    ];
    // 保证20题
    const TOTAL_QS = 20;
    if (QUESTION_SET.length !== TOTAL_QS) console.warn("实际题库数量不一致", QUESTION_SET.length);
 
    // ---------- 趣味惩罚库（课堂活跃）----------
    const PENALTY_LIST = [
        "🎤 才艺展示：即兴唱一段流行歌曲（至少10秒）！",
        "🕺 创意模仿：模仿查理大帝加冕时的庄严姿势！",
        "😜 搞怪表情：对着全班做夸张的鬼脸，保持5秒钟！",
        "📖 亲吻历史课本5秒：并大声说“我爱中世纪历史”！",
        "🤹 即兴表演：模仿骑士册封礼的经典动作！",
        "🎭 讲一个关于法兰克王国的小笑话或趣闻！",
        "🐎 模仿战马冲锋的声音和动作！",
        "✝️ 用最虔诚的语气祈祷：“上帝保佑法兰克，赐我智慧”！",
        "🎵 用rap风格介绍克洛维的一个贡献！",
        "💪 做个大力士姿势并喊“为了法兰克”！"
    ];
 
    // ---------- WebAudio 音效 (无须外部文件，使用Web Audio API生成短促音效) ----------
    let audioCtx = null;
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') {
            audioCtx.resume();
        }
    }
    // 播放正确音效（清脆胜利号角感）
    function playCorrectSound() {
        try {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 880;
            gain.gain.setValueAtTime(0.3, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
            osc.start();
            osc.stop(now + 0.6);
            // 第二个谐音
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.value = 1100;
            gain2.gain.setValueAtTime(0.2, now + 0.05);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.7);
            osc2.start(now + 0.05);
            osc2.stop(now + 0.65);
        } catch(e) { console.log("音效不支持"); }
    }
    // 播放错误音效（短促低音，滑稽失败感）
    function playWrongSound() {
        try {
            initAudio();
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.frequency.value = 440;
            gain.gain.setValueAtTime(0.35, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc.start();
            osc.stop(now + 0.45);
            // 下滑音效果
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            osc2.frequency.setValueAtTime(330, now);
            osc2.frequency.exponentialRampToValueAtTime(220, now + 0.3);
            gain2.gain.setValueAtTime(0.25, now);
            gain2.gain.exponentialRampToValueAtTime(0.0001, now + 0.5);
            osc2.start();
            osc2.stop(now + 0.5);
        } catch(e) {}
    }
 
    // ---- 游戏状态 ----
    let currentPlayer = 0;             // 0左骑士 1右主教
    let scores = [0, 0];
    let currentQIndex = 0;            // 0~19
    let isActive = false;              // 是否处于答题活跃状态
    let waitingForNext = true;         
    let timerInterval = null;
    let timeLeft = 10;
    let currentQuestionObj = null;
    let isLocked = false;              
 
    // DOM 元素
    const p1ScoreSpan = document.getElementById('scoreP1');
    const p2ScoreSpan = document.getElementById('scoreP2');
    const player1Div = document.getElementById('player1Card');
    const player2Div = document.getElementById('player2Card');
    const turnIndicatorSpan = document.getElementById('turnIndicator');
    const questionTextDiv = document.getElementById('questionText');
    const optionsContainer = document.getElementById('optionsContainer');
    const nextBtn = document.getElementById('nextBtn');
    const timerFillDiv = document.getElementById('timerFill');
    const timerDisplaySpan = document.getElementById('timerDisplay');
    const qIndexSpan = document.getElementById('qIndex');
    const totalQSpan = document.getElementById('totalQ');
    const resetBtn = document.getElementById('resetGameBtn');
 
    totalQSpan.innerText = TOTAL_QS;
 
    function updateUI() {
        p1ScoreSpan.innerText = scores[0];
        p2ScoreSpan.innerText = scores[1];
        if (currentPlayer === 0) {
            player1Div.classList.add('active');
            player2Div.classList.remove('active');
            turnIndicatorSpan.innerText = "左将·骑士克洛维";
        } else {
            player2Div.classList.add('active');
            player1Div.classList.remove('active');
            turnIndicatorSpan.innerText = "右卫·主教查理";
        }
        qIndexSpan.innerText = currentQIndex;
    }
 
    function stopTimer() {
        if (timerInterval) {
            clearInterval(timerInterval);
            timerInterval = null;
        }
    }
 
    function updateTimerVisual() {
        const percent = (timeLeft / 10) * 100;
        timerFillDiv.style.width = `${percent}%`;
        timerDisplaySpan.innerHTML = `⏳ 剩余 ${timeLeft} 秒`;
        if (timeLeft <= 3) timerFillDiv.style.backgroundColor = "#e06c3c";
        else timerFillDiv.style.backgroundColor = "#e6b422";
    }
 
    function startTimer() {
        if (timerInterval) stopTimer();
        timeLeft = 10;
        updateTimerVisual();
        timerInterval = setInterval(() => {
            if (!isActive) return;
            if (timeLeft <= 1) {
                if (isActive && !isLocked) {
                    stopTimer();
                    handleTimeoutPenalty();
                } else {
                    stopTimer();
                }
            } else {
                timeLeft--;
                updateTimerVisual();
            }
        }, 1000);
    }
 
    function showPenaltyModal(message) {
        return new Promise((resolve) => {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'penalty-modal';
            modalDiv.innerHTML = `
                <div class="penalty-card">
                    <h2>⚜️ 宫廷惩戒 ⚜️</h2>
                    <p>${message}</p>
                    <button class="penalty-close">👑 接受惩罚，继续战斗 👑</button>
                </div>
            `;
            document.body.appendChild(modalDiv);
            const closeBtn = modalDiv.querySelector('.penalty-close');
            closeBtn.addEventListener('click', () => {
                modalDiv.remove();
                resolve();
            });
        });
    }
 
    function showFloatingMsg(msg, isGood = true) {
        const toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30%';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = isGood ? '#d69e3b' : '#b33a2e';
        toast.style.color = 'white';
        toast.style.padding = '14px 28px';
        toast.style.borderRadius = '60px';
        toast.style.fontWeight = 'bold';
        toast.style.zIndex = '2100';
        toast.style.fontSize = '1.3rem';
        toast.style.boxShadow = '0 4px 15px black';
        toast.style.border = '2px solid gold';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 1800);
    }
 
    async function handleTimeoutPenalty() {
        if (!isActive) return;
        isActive = false;
        isLocked = true;
        stopTimer();
        playWrongSound();  // 超时也是错误音效
        const penaltyMsg = PENALTY_LIST[Math.floor(Math.random() * PENALTY_LIST.length)];
        await showPenaltyModal(`⏰ ${getCurrentPlayerName()} 超时未答！惩罚：${penaltyMsg}`);
        switchToNextPlayerAfterMistake();
        await loadCurrentQuestionForPreview();
        setWaitingState(true);
    }
 
    async function wrongAnswerWithPenalty() {
        if (!isActive || isLocked) return;
        isActive = false;
        isLocked = true;
        stopTimer();
        playWrongSound();   // 答错音效
        const penalty = PENALTY_LIST[Math.floor(Math.random() * PENALTY_LIST.length)];
        await showPenaltyModal(`❌ ${getCurrentPlayerName()} 答错了！惩罚：${penalty}`);
        switchToNextPlayerAfterMistake();
        await loadCurrentQuestionForPreview();
        setWaitingState(true);
    }
 
    function correctAnswerHandler() {
        if (!isActive || isLocked) return;
        playCorrectSound();   // 正确音效
        scores[currentPlayer] += 1;
        updateUI();
        showFloatingMsg(`✅ ${getCurrentPlayerName()} 答对！ +1分，继续坚守！`, true);
        isActive = false;
        isLocked = true;
        stopTimer();
        moveToNextQuestion();
        loadCurrentQuestionForPreview().then(() => {
            setWaitingState(true);
        });
    }
 
    function switchToNextPlayerAfterMistake() {
        currentPlayer = currentPlayer === 0 ? 1 : 0;
        updateUI();
        moveToNextQuestion();
    }
 
    function moveToNextQuestion() {
        if (currentQIndex + 1 <= TOTAL_QS) {
            currentQIndex++;
        }
        if (currentQIndex >= TOTAL_QS) {
            endGame();
        }
    }
 
    function endGame() {
        if (timerInterval) clearInterval(timerInterval);
        isActive = false;
        isLocked = true;
        let winnerMsg = "";
        if (scores[0] > scores[1]) winnerMsg = "🏆 骑士·克洛维阵营获胜！ 🏆";
        else if (scores[1] > scores[0]) winnerMsg = "🏆 主教·查理阵营获胜！ 🏆";
        else winnerMsg = "🤝 平局！两位中世纪英杰不分伯仲！ 🤝";
        alert(`⚜️ 游戏结束 ⚜️\n最终比分  ${scores[0]}  :  ${scores[1]}\n${winnerMsg}`);
        optionsContainer.innerHTML = `<div style="grid-column:1/-1; text-align:center;color:#ffdbaa;">🏁 对决落幕，点击「重新开局」继续PK 🏁</div>`;
        nextBtn.disabled = true;
        nextBtn.style.opacity = "0.5";
    }
 
    async function loadCurrentQuestionForPreview() {
        if (currentQIndex >= TOTAL_QS) {
            endGame();
            return;
        }
        const qData = QUESTION_SET[currentQIndex];
        currentQuestionObj = qData;
        questionTextDiv.innerText = qData.text;
        renderOptions(qData.options);
        timerFillDiv.style.width = "100%";
        timerDisplaySpan.innerHTML = "⏸ 按「下一题」开始作答";
        document.querySelectorAll('.option-btn').forEach(btn => { btn.disabled = true; });
        isActive = false;
        isLocked = false;
        if (timerInterval) clearInterval(timerInterval);
        updateUI();
    }
 
    function renderOptions(opts) {
        optionsContainer.innerHTML = '';
        opts.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.classList.add('option-btn');
            btn.dataset.idx = idx;
            btn.addEventListener('click', (e) => {
                if (!isActive || isLocked) return;
                const selectedIdx = parseInt(btn.dataset.idx);
                if (selectedIdx === currentQuestionObj.correct) {
                    correctAnswerHandler();
                } else {
                    wrongAnswerWithPenalty();
                }
            });
            optionsContainer.appendChild(btn);
        });
    }
 
    function activateCurrentRound() {
        if (currentQIndex >= TOTAL_QS) {
            endGame();
            return false;
        }
        if (!currentQuestionObj || currentQuestionObj.text !== QUESTION_SET[currentQIndex]?.text) {
            const freshQ = QUESTION_SET[currentQIndex];
            currentQuestionObj = freshQ;
            questionTextDiv.innerText = freshQ.text;
            renderOptions(freshQ.options);
        }
        document.querySelectorAll('.option-btn').forEach(btn => { btn.disabled = false; });
        isActive = true;
        isLocked = false;
        timeLeft = 10;
        updateTimerVisual();
        startTimer();
        updateUI();
        return true;
    }
 
    function setWaitingState(wait) {
        if (wait) {
            waitingForNext = true;
            isActive = false;
            if (timerInterval) clearInterval(timerInterval);
            document.querySelectorAll('.option-btn').forEach(btn => btn.disabled = true);
            timerDisplaySpan.innerHTML = "⏸ 按下「下一题」开始答题";
            timerFillDiv.style.width = "100%";
            nextBtn.disabled = false;
        } else {
            waitingForNext = false;
            nextBtn.disabled = true;
        }
    }
 
    async function onNextPressed() {
        if (!waitingForNext) return;
        if (currentQIndex >= TOTAL_QS) {
            endGame();
            return;
        }
        if (!currentQuestionObj || currentQuestionObj.text !== QUESTION_SET[currentQIndex]?.text) {
            const q = QUESTION_SET[currentQIndex];
            currentQuestionObj = q;
            questionTextDiv.innerText = q.text;
            renderOptions(q.options);
        }
        setWaitingState(false);
        activateCurrentRound();
    }
 
    function resetFullGame() {
        stopTimer();
        scores = [0, 0];
        currentPlayer = 0;
        currentQIndex = 0;
        isActive = false;
        waitingForNext = true;
        isLocked = false;
        updateUI();
        currentQuestionObj = QUESTION_SET[0];
        questionTextDiv.innerText = currentQuestionObj.text;
        renderOptions(currentQuestionObj.options);
        setWaitingState(true);
        timerDisplaySpan.innerHTML = "⏸ 按「下一题」开始作答";
        timerFillDiv.style.width = "100%";
        nextBtn.disabled = false;
        nextBtn.style.opacity = "1";
        if (timerInterval) clearInterval(timerInterval);
        updateUI();
    }
 
    function getCurrentPlayerName() {
        return currentPlayer === 0 ? "骑士·克洛维" : "主教·查理";
    }
 
    // 绑定事件 & 初始化音频上下文需要用户首次点击页面任意地方启动（浏览器策略）
    function enableAudioOnFirstInteraction() {
        document.body.addEventListener('click', () => {
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }, { once: true });
    }
    enableAudioOnFirstInteraction();
 
    nextBtn.addEventListener('click', onNextPressed);
    resetBtn.addEventListener('click', () => resetFullGame());
    resetFullGame();
</script>
</body>
</html>
